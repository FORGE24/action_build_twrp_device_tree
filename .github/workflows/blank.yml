name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 修正：将 dtc 改为 device-tree-compiler
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git lz4 lzop device-tree-compiler tar
        
        # 核心改动：降级到 2.1.2 版本，这个版本在 Actions 里最稳
        sudo pip3 install twrpdtgen==2.1.2 python-magic
        
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 识别并统一命名
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        echo "File info:"
        file recovery.img
      
    - name: Start build
      run: |
        # 2.1.2 版本的参数格式非常标准
        python3 -m twrpdtgen recovery.img -o dt/
      
    - name: ZIP device tree
      run: |
        # 只要生成的目录里有文件就打包
        if [ -d "dt" ] && [ "$(ls -A dt)" ]; then
          zip -r DeviceTree.zip ./dt
        else
          echo "Error: Device tree generation failed."
          ls -R
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build info:
          - Tool: twrpdtgen v2.1.2 (Stable)
          - Image: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
