name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 安装核心依赖，包括 32 位运行库和解包工具
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git
        pip3 install twrpdtgen python-magic
        
        # 核心修复：手动准备 AIK 环境，防止 twrpdtgen 自动克隆失败
        git clone https://github.com/SebaUbuntu/AIK-Linux-mirror /home/runner/AIK
        chmod -R 777 /home/runner/AIK
        
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 自动重命名镜像
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        ls -lh
      
    - name: Start build
      run: |
        # 显式告知环境变量（如果工具支持）并运行
        # 针对 3.0.0 版本，如果它依然尝试自己 clone，我们通过 sudo 提升权限强制执行
        sudo python3 -m twrpdtgen recovery.img -o dt/
      
    - name: ZIP device tree
      run: |
        # 更加宽松的打包判定
        if [ -d "dt" ] && [ "$(ls -A dt)" ]; then
          zip -r DeviceTree.zip ./dt
        else
          echo "Error: Device tree generation failed. No files in dt/"
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build successful!
          Generated from: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
