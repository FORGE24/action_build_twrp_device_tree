name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 安装 32 位库和必要工具
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git
        
        # 关键：使用 sudo 安装 pip 模块，确保全局可用
        sudo pip3 install twrpdtgen python-magic
        
        # 预先准备 AIK 环境并赋予最高权限
        sudo git clone https://github.com/SebaUbuntu/AIK-Linux-mirror /home/runner/AIK
        sudo chmod -R 777 /home/runner/AIK
        
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 识别下载的第一个 img 文件并重命名
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        ls -lh
      
    - name: Start build
      run: |
        # 统一使用 sudo 运行，确保解包过程不会因为权限报 return code 1
        sudo python3 -m twrpdtgen recovery.img -o dt/
      
    - name: ZIP device tree
      run: |
        # 增加 sudo 权限打包，防止某些解包出来的文件无法读取
        if [ -d "dt" ]; then
          sudo zip -r DeviceTree.zip ./dt
        else
          echo "Error: dt directory not found."
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Generated from: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
