name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 安装所有必要的底层依赖
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git lz4 lzop device-tree-compiler tar
        
        # 升级 pip 并安装稳定的 2.1.0 版本
        sudo pip3 install --upgrade pip
        sudo pip3 install twrpdtgen==2.1.0 python-magic
        
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 识别并统一命名镜像文件
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        echo "File check:"
        file recovery.img
      
    - name: Start build
      run: |
        # 使用 2.1.0 版本进行构建
        python3 -m twrpdtgen recovery.img -o dt/
      
    - name: ZIP device tree
      run: |
        # 检查是否生成了文件夹（2.1.x 生成的结构通常在 dt/ 目录下）
        if [ -d "dt" ] && [ "$(ls -A dt)" ]; then
          zip -r DeviceTree.zip ./dt
        else
          echo "Error: Device tree generation failed. Current directory content:"
          ls -R
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build successful!
          - Tool: twrpdtgen v2.1.0
          - Image URL: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
