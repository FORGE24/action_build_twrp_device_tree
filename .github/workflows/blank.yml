name: Make TWRP Device (Auto-Fix Props)

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'Recovery 镜像直链'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare Environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2 git lz4 lzop device-tree-compiler tar
        sudo pip3 install --upgrade pip
        sudo pip3 install twrpdtgen==2.1.0 python-magic
        git clone https://github.com/draekko/AIK-Linux.git $HOME/AIK
        chmod -R 777 $HOME/AIK

    - name: Download and Pre-process Image
      run: |
        aria2c -L "${{ github.event.inputs.IMG_URL }}"
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        
        # --- 核心修复逻辑：手动注入属性防止 AssertionError ---
        echo "正在使用 AIK 解包并注入 OPPO 缺失属性..."
        cp recovery.img $HOME/AIK/
        cd $HOME/AIK/
        ./unpackimg.sh recovery.img
        
        # 强制将 PEFM00 属性写入 ramdisk 中的所有可能配置文件
        # 针对 OPPO A35 的 MTK 平台特性
        for propfile in ramdisk/default.prop ramdisk/prop.default ramdisk/system/etc/prop.default; do
          if [ -f "$propfile" ]; then
            echo "注入属性到 $propfile"
            echo "ro.product.device=PEFM00" >> "$propfile"
            echo "ro.product.system.device=PEFM00" >> "$propfile"
            echo "ro.product.manufacturer=oppo" >> "$propfile"
            echo "ro.product.brand=oppo" >> "$propfile"
            echo "ro.product.model=OPPO A35" >> "$propfile"
          fi
        done
        
        ./repackimg.sh
        mv image-new.img $GITHUB_WORKSPACE/recovery_fixed.img
        cd $GITHUB_WORKSPACE

    - name: Run twrpdtgen
      run: |
        # 使用修复后的镜像生成设备树
        mkdir dt
        python3 -m twrpdtgen recovery_fixed.img -o dt/ || {
          echo "自动识别仍失败，尝试强制参数模式..."
          python3 -m twrpdtgen recovery_fixed.img --manufacturer oppo --codename PEFM00 -o dt/
        }
      
    - name: ZIP and Upload
      if: always()
      run: |
        if [ -d "dt" ] && [ "$(ls -A dt)" ]; then
          # 额外检查：确保生成的目录里有关键文件
          zip -r DeviceTree_PEFM00.zip ./dt
        else
          echo "最终生成失败，请检查输出日志。"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_DT_OPPO_A35
        path: DeviceTree_PEFM00.zip
