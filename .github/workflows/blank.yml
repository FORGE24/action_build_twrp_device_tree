name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 核心：添加了 libmagic1，这是 AIK 识别文件类型所必需的
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1
        # 安装 twrpdtgen 及其可能需要的 magic 依赖
        pip3 install twrpdtgen python-magic
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 这里的命名可能是 recovery.1.img，我们统一重命名简化处理
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        ls -lh
      
    - name: Start build
      run: |
        # 使用 python3 调用，并增加调试参数 -d (debug)
        # 如果还是报错，可以通过日志看到 AIK 具体的输出
        python3 -m twrpdtgen recovery.img -o dt/ -d
      
    - name: ZIP device tree
      run: |
        if [ -d "dt" ]; then
          zip -r DeviceTree.zip ./dt
        else
          echo "Error: Device tree generation failed. No dt directory found."
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          DeviceTree generated for: ${{ github.event.inputs.IMG_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
