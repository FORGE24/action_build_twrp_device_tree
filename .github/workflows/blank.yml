name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    
    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        sudo apt update
        # 安装 AIK 和 twrpdtgen 所需的核心依赖
        # 包括 32 位运行库 (lib32z1, lib32ncurses6) 和 必要的解包工具
        sudo apt -y install python3 python3-pip cpio wget aria2 libmagic1 file \
                           lib32z1 lib32ncurses6 lib32stdc++6 \
                           xz-utils gzip bzip2
        pip3 install twrpdtgen python-magic
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        # 自动识别并重命名下载的文件
        IMG_NAME=$(ls *.img | head -n 1)
        mv "$IMG_NAME" recovery.img
        ls -lh
      
    - name: Start build
      run: |
        # 使用 sudo 运行有时可以解决 AIK 在 /tmp 下的权限问题
        # 但 twrpdtgen 通常推荐普通权限，如果下面失败，可以尝试在前面加 sudo
        python3 -m twrpdtgen recovery.img -o dt/
      
    - name: ZIP device tree
      run: |
        if [ -d "dt/xiaomi" ] || [ -d "dt/samsung" ] || [ -n "$(ls -A dt/ 2>/dev/null)" ]; then
          zip -r DeviceTree.zip ./dt
        else
          echo "Error: Device tree generation failed. Check logs above."
          exit 1
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build Info:
          - Image URL: ${{ github.event.inputs.IMG_URL }}
          - Tool: twrpdtgen 3.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
